server:
  port: 8081

spring:
  application:
    name: rule-engine-server
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:ruleengine}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:qiubin78}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  jackson:
    serialization:
      fail-on-empty-beans: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

his:
  enabled: false
  base-url: ""
  auth-type: bearer
  auth-token: ""
  api-key: ""
  connect-timeout-ms: 5000
  read-timeout-ms: 10000

logging:
  level:
    com.ruleengine: DEBUG
    org.drools: INFO
